name: Notice i18n Tasks
on:
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize

jobs:
  notice-i18n-tasks:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: 0

    - name: Check diffs
      id: check-diffs
      run: |
        git remote add --fetch upstream "https://github.com/${{ github.repository }}.git"
        ancestor="$(git show-branch --merge-base upstream/${{ github.event.pull_request.base.ref }} ${{ github.event.pull_request.head.sha }})"

        echo "==== ancestor ===="
        echo "${ancestor}"

        updated_files="$(.github/workflows/deep-diff.sh website/content/en ${ancestor} ${{ github.event.pull_request.head.sha }})"
        echo "count=$(echo $updated_files | grep -v '^$' | wc -l)" >> $GITHUB_OUTPUT

        echo "==== updated files ===="
        echo "${updated_files}"

    - name: Send notice on the issue
      if: steps.check-diffs.outputs.count > 0
      uses: thollander/actions-comment-pull-request@v2
      with:
        comment_tag: i18n-notice
        message: |
          ### Action Required
          You are adding or updating English content so please take the following actions for other languages.
          - If you are **adding new pages**, create a translation stub for each supported language (`es`, `zh`, `ja`, `ko`, `fr`, `de`). The stub only needs frontmatter with `outdated: true` — no body content. Without stubs, the new page will 404 in other languages.
          - If you are **updating existing content** that has translations, add `outdated: true` to the frontmatter of the corresponding translated files so the site shows a "Translation Needed" banner on those pages.

          See the [README](https://github.com/Cloud-Native-Platform-Engineering/cnpe-community#adding-new-pages) for more details.
